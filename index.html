<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Bowling League Secretary</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback } = React;

    // ============ SUPABASE CONFIG ============
    const SUPABASE_URL = 'https://zoaimvqswzljyxnggonp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_3bCKh56FWvlt_HSmbQ4oxg_vtRFMy-D';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ============ ICONS ============
    const Icon = ({ path, className = "w-5 h-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
    );
    const Lock = (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />;
    const Plus = (p) => <Icon {...p} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
    const Archive = (p) => <Icon {...p} path={<><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></>} />;
    const Trash2 = (p) => <Icon {...p} path={<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></>} />;
    const Download = (p) => <Icon {...p} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
    const SettingsIcon = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>} />;
    const Users = (p) => <Icon {...p} path={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />;
    const Calendar = (p) => <Icon {...p} path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />;
    const ChevronLeft = (p) => <Icon {...p} path={<polyline points="15 18 9 12 15 6"/>} />;
    const Eye = (p) => <Icon {...p} path={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>} />;
    const EyeOff = (p) => <Icon {...p} path={<><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></>} />;
    const Check = (p) => <Icon {...p} path={<polyline points="20 6 9 17 4 12"/>} />;
    const X = (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
    const Save = (p) => <Icon {...p} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />;
    const Share = (p) => <Icon {...p} path={<><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></>} />;
    const LogOut = (p) => <Icon {...p} path={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>} />;

    // ============ MAIN APP ============
    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        db.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setLoading(false);
        });
        const { data: { subscription } } = db.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });
        return () => subscription.unsubscribe();
      }, []);

      if (loading) return <div className="min-h-screen bg-slate-900 flex items-center justify-center"><div className="text-slate-300 text-lg">Loading...</div></div>;
      if (!session) return <AuthScreen />;
      return <MainApp session={session} />;
    }

    // ============ AUTH SCREEN ============
    function AuthScreen() {
      const [mode, setMode] = useState('signin'); // signin or signup
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [error, setError] = useState('');
      const [message, setMessage] = useState('');
      const [busy, setBusy] = useState(false);

      const handleSignIn = async () => {
        setError(''); setMessage(''); setBusy(true);
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) setError(error.message);
        setBusy(false);
      };

      const handleSignUp = async () => {
        setError(''); setMessage(''); setBusy(true);
        if (password.length < 6) { setError('Password must be at least 6 characters'); setBusy(false); return; }
        if (password !== confirmPassword) { setError('Passwords do not match'); setBusy(false); return; }
        const { data, error } = await db.auth.signUp({ email, password });
        if (error) {
          setError(error.message);
        } else if (data.user && !data.session) {
          setMessage('Check your email to confirm your account, then sign in.');
        } else {
          setMessage('Account created! You are now signed in.');
        }
        setBusy(false);
      };

      return (
        <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
          <div className="bg-slate-800 rounded-2xl shadow-2xl p-8 w-full max-w-md border border-slate-700">
            <div className="flex justify-center mb-6">
              <div className="bg-amber-500 rounded-full p-4"><Lock className="w-8 h-8 text-slate-900" /></div>
            </div>
            <h1 className="text-3xl font-bold text-center text-white mb-2">Bowling League Secretary</h1>
            <p className="text-center text-slate-400 mb-6">{mode === 'signin' ? 'Sign in to your account' : 'Create your account'}</p>

            <div className="flex bg-slate-700 rounded-lg p-1 mb-6">
              <button onClick={() => { setMode('signin'); setError(''); setMessage(''); }} className={`flex-1 py-2 rounded-md font-semibold ${mode === 'signin' ? 'bg-amber-500 text-slate-900' : 'text-slate-300'}`}>Sign In</button>
              <button onClick={() => { setMode('signup'); setError(''); setMessage(''); }} className={`flex-1 py-2 rounded-md font-semibold ${mode === 'signup' ? 'bg-amber-500 text-slate-900' : 'text-slate-300'}`}>Sign Up</button>
            </div>

            <div className="space-y-4">
              <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email" className="w-full bg-slate-700 text-white rounded-lg px-4 py-3 border border-slate-600 focus:border-amber-500 focus:outline-none" autoComplete="email" />
              <div className="relative">
                <input type={showPassword ? 'text' : 'password'} value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter' && mode === 'signin') handleSignIn(); }} placeholder="Password" className="w-full bg-slate-700 text-white rounded-lg px-4 py-3 pr-12 border border-slate-600 focus:border-amber-500 focus:outline-none" autoComplete={mode === 'signin' ? 'current-password' : 'new-password'} />
                <button onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white">{showPassword ? <EyeOff className="w-5 h-5" /> : <Eye className="w-5 h-5" />}</button>
              </div>
              {mode === 'signup' && (
                <input type={showPassword ? 'text' : 'password'} value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} placeholder="Confirm password" className="w-full bg-slate-700 text-white rounded-lg px-4 py-3 border border-slate-600 focus:border-amber-500 focus:outline-none" autoComplete="new-password" />
              )}
              {error && <div className="text-red-400 text-sm text-center">{error}</div>}
              {message && <div className="text-green-400 text-sm text-center">{message}</div>}
              <button disabled={busy} onClick={mode === 'signin' ? handleSignIn : handleSignUp} className="w-full bg-amber-500 hover:bg-amber-400 disabled:opacity-50 text-slate-900 font-bold py-3 rounded-lg text-lg">{busy ? 'Please wait...' : (mode === 'signin' ? 'Sign In' : 'Create Account')}</button>
            </div>
          </div>
        </div>
      );
    }

    // ============ MAIN APP (authenticated) ============
    function MainApp({ session }) {
      const [leagues, setLeagues] = useState([]);
      const [loading, setLoading] = useState(true);
      const [currentLeagueId, setCurrentLeagueId] = useState(null);
      const [view, setView] = useState('home');
      const [showArchived, setShowArchived] = useState(false);
      const [showNewLeagueForm, setShowNewLeagueForm] = useState(false);
      const [newLeagueName, setNewLeagueName] = useState('');
      const [syncing, setSyncing] = useState(false);
      const [syncError, setSyncError] = useState('');

      const userId = session.user.id;
      const userEmail = session.user.email;

      // Load leagues from Supabase
      const loadLeagues = useCallback(async () => {
        setLoading(true);
        const { data, error } = await db
          .from('leagues')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) {
          setSyncError('Failed to load: ' + error.message);
        } else {
          setLeagues(data.map(l => ({
            id: l.id,
            name: l.name,
            archived: l.archived,
            createdAt: l.created_at,
            ownerId: l.owner_id,
            settings: l.settings,
            teams: l.teams,
            weeklyPayments: l.weekly_payments || {},
          })));
        }
        setLoading(false);
      }, []);

      useEffect(() => { loadLeagues(); }, [loadLeagues]);

      // Realtime subscription for live sync
      useEffect(() => {
        const channel = db
          .channel('leagues_changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'leagues' }, () => {
            loadLeagues();
          })
          .subscribe();
        return () => { db.removeChannel(channel); };
      }, [loadLeagues]);

      const saveLeague = async (league) => {
        setSyncing(true); setSyncError('');
        const { error } = await db
          .from('leagues')
          .update({
            name: league.name,
            archived: league.archived,
            settings: league.settings,
            teams: league.teams,
            weekly_payments: league.weeklyPayments,
          })
          .eq('id', league.id);
        if (error) setSyncError('Sync error: ' + error.message);
        setSyncing(false);
      };

      const updateLeague = async (updates) => {
        const updated = leagues.map(l => l.id === currentLeagueId ? { ...l, ...updates } : l);
        setLeagues(updated);
        const league = updated.find(l => l.id === currentLeagueId);
        if (league) await saveLeague(league);
      };

      const createLeague = async () => {
        if (!newLeagueName.trim()) return;
        setSyncing(true); setSyncError('');
        const newLeague = {
          name: newLeagueName.trim(),
          archived: false,
          owner_id: userId,
          settings: {
            startDate: new Date().toISOString().split('T')[0],
            dayOfWeek: 'Monday',
            numTeams: 4,
            playersPerTeam: 4,
            includeSubstitute: true,
            numWeeks: 30,
            weeklyFeePerPlayer: 15,
            alleyFeePerPlayer: 10,
            linesPerWeek: 3,
            secretaryRatePerLine: 0.60,
          },
          teams: Array.from({ length: 4 }, (_, i) => ({
            id: `team_${Date.now()}_${i}`,
            name: `Team ${i + 1}`,
            players: Array.from({ length: 5 }, (_, j) => ({
              id: `player_${Date.now()}_${i}_${j}`,
              name: '',
              isSubstitute: j === 4,
            })),
          })),
          weekly_payments: {},
        };
        const { data, error } = await db.from('leagues').insert(newLeague).select().single();
        if (error) {
          setSyncError('Could not create league: ' + error.message);
        } else {
          await loadLeagues();
          setCurrentLeagueId(data.id);
          setNewLeagueName('');
          setShowNewLeagueForm(false);
          setView('league');
        }
        setSyncing(false);
      };

      const archiveLeague = async (id) => {
        await db.from('leagues').update({ archived: true }).eq('id', id);
        await loadLeagues();
        if (currentLeagueId === id) { setCurrentLeagueId(null); setView('home'); }
      };

      const unarchiveLeague = async (id) => {
        await db.from('leagues').update({ archived: false }).eq('id', id);
        await loadLeagues();
      };

      const deleteLeague = async (id) => {
        if (window.confirm('Are you sure you want to permanently delete this league? This cannot be undone.')) {
          await db.from('leagues').delete().eq('id', id);
          await loadLeagues();
          if (currentLeagueId === id) { setCurrentLeagueId(null); setView('home'); }
        }
      };

      const signOut = async () => {
        await db.auth.signOut();
      };

      const currentLeague = leagues.find(l => l.id === currentLeagueId);

      if (loading) return <div className="min-h-screen bg-slate-900 flex items-center justify-center"><div className="text-slate-300 text-lg">Loading your leagues...</div></div>;

      if (view === 'home' || !currentLeague) {
        const activeLeagues = leagues.filter(l => !l.archived);
        const archivedLeagues = leagues.filter(l => l.archived);
        return (
          <div className="min-h-screen bg-slate-900 p-4 md:p-8">
            <div className="max-w-5xl mx-auto">
              <div className="flex flex-wrap items-center justify-between gap-4 mb-2">
                <h1 className="text-3xl md:text-4xl font-bold text-white">My Leagues</h1>
                <div className="flex gap-2">
                  <button onClick={signOut} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm"><LogOut className="w-4 h-4" /> Sign Out</button>
                </div>
              </div>
              <p className="text-slate-400 text-sm mb-6">Signed in as {userEmail}</p>

              {syncError && <div className="bg-red-900/50 border border-red-700 text-red-200 rounded-lg p-3 mb-4 text-sm">{syncError}</div>}

              {showNewLeagueForm ? (
                <div className="bg-slate-800 rounded-xl p-6 mb-6 border border-amber-500">
                  <h3 className="text-xl font-bold text-white mb-4">New League</h3>
                  <div className="flex flex-col md:flex-row gap-3">
                    <input type="text" value={newLeagueName} onChange={(e) => setNewLeagueName(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') createLeague(); }} placeholder="League name (e.g., Monday Night Strikers)" className="flex-1 bg-slate-700 text-white rounded-lg px-4 py-3 border border-slate-600 focus:border-amber-500 focus:outline-none" autoFocus />
                    <button disabled={syncing} onClick={createLeague} className="bg-amber-500 hover:bg-amber-400 disabled:opacity-50 text-slate-900 font-bold px-6 py-3 rounded-lg">{syncing ? 'Creating...' : 'Create'}</button>
                    <button onClick={() => { setShowNewLeagueForm(false); setNewLeagueName(''); }} className="bg-slate-700 hover:bg-slate-600 text-white px-6 py-3 rounded-lg">Cancel</button>
                  </div>
                </div>
              ) : (
                <button onClick={() => setShowNewLeagueForm(true)} className="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold py-4 rounded-xl mb-6 flex items-center justify-center gap-2 text-lg"><Plus className="w-6 h-6" /> New League</button>
              )}

              {activeLeagues.length === 0 && archivedLeagues.length === 0 && (
                <div className="bg-slate-800 rounded-xl p-12 text-center border border-slate-700"><p className="text-slate-400 text-lg">No leagues yet. Create one to get started.</p></div>
              )}

              {activeLeagues.length > 0 && (
                <div className="space-y-3 mb-8">
                  {activeLeagues.map(league => (
                    <div key={league.id} className="bg-slate-800 rounded-xl p-5 border border-slate-700 hover:border-amber-500 transition-colors">
                      <div className="flex flex-wrap items-center justify-between gap-3">
                        <div className="flex-1 min-w-0">
                          <h3 className="text-xl font-bold text-white truncate">{league.name}</h3>
                          <p className="text-slate-400 text-sm">{league.settings.numTeams} teams · {league.settings.dayOfWeek}s · {league.settings.numWeeks} weeks{league.ownerId !== userId ? ' · Shared with you' : ''}</p>
                        </div>
                        <div className="flex gap-2">
                          <button onClick={() => { setCurrentLeagueId(league.id); setView('league'); }} className="bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold px-5 py-2 rounded-lg">Open</button>
                          {league.ownerId === userId && (
                            <button onClick={() => archiveLeague(league.id)} className="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg" title="Archive"><Archive className="w-5 h-5" /></button>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {archivedLeagues.length > 0 && (
                <div>
                  <button onClick={() => setShowArchived(!showArchived)} className="text-slate-400 hover:text-white mb-3 text-sm">{showArchived ? 'Hide' : 'Show'} Archived ({archivedLeagues.length})</button>
                  {showArchived && (
                    <div className="space-y-3">
                      {archivedLeagues.map(league => (
                        <div key={league.id} className="bg-slate-800/50 rounded-xl p-5 border border-slate-700 opacity-70">
                          <div className="flex flex-wrap items-center justify-between gap-3">
                            <div className="flex-1 min-w-0">
                              <h3 className="text-lg font-bold text-slate-300 truncate">{league.name}</h3>
                              <p className="text-slate-500 text-sm">Archived</p>
                            </div>
                            <div className="flex gap-2">
                              <button onClick={() => { setCurrentLeagueId(league.id); setView('league'); }} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm">View</button>
                              {league.ownerId === userId && (
                                <>
                                  <button onClick={() => unarchiveLeague(league.id)} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm">Restore</button>
                                  <button onClick={() => deleteLeague(league.id)} className="bg-red-900 hover:bg-red-800 text-white px-3 py-2 rounded-lg" title="Delete permanently"><Trash2 className="w-4 h-4" /></button>
                                </>
                              )}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        );
      }

      return <LeagueView league={currentLeague} updateLeague={updateLeague} goBack={() => { setView('home'); setCurrentLeagueId(null); }} userId={userId} syncing={syncing} syncError={syncError} />;
    }

    // ============ LEAGUE VIEW ============
    function LeagueView({ league, updateLeague, goBack, userId, syncing, syncError }) {
      const [tab, setTab] = useState('weeks');
      const [selectedWeek, setSelectedWeek] = useState(1);
      const [showShareModal, setShowShareModal] = useState(false);
      const s = league.settings;
      const isOwner = league.ownerId === userId;
      const allPlayers = league.teams.flatMap(t => t.players.map(p => ({ ...p, teamName: t.name, teamId: t.id })));
      const activePlayers = allPlayers.filter(p => p.name.trim() !== '');

      const getWeekData = (weekNum) => {
        const weekKey = `week_${weekNum}`;
        const payments = league.weeklyPayments[weekKey] || {};
        const paidPlayers = activePlayers.filter(p => payments[p.id]);
        const totalCollected = paidPlayers.length * s.weeklyFeePerPlayer;
        const owedToAlley = paidPlayers.length * s.alleyFeePerPlayer;
        const secretaryPay = paidPlayers.length * s.linesPerWeek * s.secretaryRatePerLine;
        const prizePool = totalCollected - owedToAlley - secretaryPay;
        return { paidCount: paidPlayers.length, totalCollected, owedToAlley, secretaryPay, prizePool };
      };

      const seasonTotals = Array.from({ length: s.numWeeks }, (_, i) => getWeekData(i + 1))
        .reduce((acc, w) => ({
          totalCollected: acc.totalCollected + w.totalCollected,
          owedToAlley: acc.owedToAlley + w.owedToAlley,
          secretaryPay: acc.secretaryPay + w.secretaryPay,
          prizePool: acc.prizePool + w.prizePool,
        }), { totalCollected: 0, owedToAlley: 0, secretaryPay: 0, prizePool: 0 });

      const togglePayment = (weekNum, playerId) => {
        const weekKey = `week_${weekNum}`;
        const currentWeek = league.weeklyPayments[weekKey] || {};
        updateLeague({ weeklyPayments: { ...league.weeklyPayments, [weekKey]: { ...currentWeek, [playerId]: !currentWeek[playerId] } } });
      };

      const markAllPaid = (weekNum, paid) => {
        const weekKey = `week_${weekNum}`;
        const newWeek = {};
        activePlayers.forEach(p => { newWeek[p.id] = paid; });
        updateLeague({ weeklyPayments: { ...league.weeklyPayments, [weekKey]: newWeek } });
      };

      const exportToXLS = () => {
        const escape = (str) => String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        let html = '<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body>';
        html += `<h2>${escape(league.name)}</h2>`;
        html += '<table border="1"><tr><th colspan="2" style="background-color:#f59e0b;">League Settings</th></tr>';
        html += `<tr><td>Start Date</td><td>${s.startDate}</td></tr>`;
        html += `<tr><td>Day of Week</td><td>${s.dayOfWeek}</td></tr>`;
        html += `<tr><td>Number of Teams</td><td>${s.numTeams}</td></tr>`;
        html += `<tr><td>Players per Team</td><td>${s.playersPerTeam}${s.includeSubstitute ? ' (+1 substitute)' : ''}</td></tr>`;
        html += `<tr><td>Number of Weeks</td><td>${s.numWeeks}</td></tr>`;
        html += `<tr><td>Weekly Fee per Player</td><td>$${s.weeklyFeePerPlayer.toFixed(2)}</td></tr>`;
        html += `<tr><td>Alley Fee per Player</td><td>$${s.alleyFeePerPlayer.toFixed(2)}</td></tr>`;
        html += `<tr><td>Lines per Week</td><td>${s.linesPerWeek}</td></tr>`;
        html += `<tr><td>Secretary Rate per Line</td><td>$${s.secretaryRatePerLine.toFixed(2)}</td></tr>`;
        html += '</table><br/>';
        html += '<table border="1"><tr><th style="background-color:#f59e0b;">Team</th><th style="background-color:#f59e0b;">Player</th>';
        for (let w = 1; w <= s.numWeeks; w++) html += `<th style="background-color:#f59e0b;">Week ${w}</th>`;
        html += '<th style="background-color:#f59e0b;">Total Paid</th></tr>';
        league.teams.forEach(team => {
          team.players.forEach(player => {
            if (!player.name.trim()) return;
            let totalWeeks = 0;
            html += `<tr><td>${escape(team.name)}</td><td>${escape(player.name)}${player.isSubstitute ? ' (Sub)' : ''}</td>`;
            for (let w = 1; w <= s.numWeeks; w++) {
              const paid = league.weeklyPayments[`week_${w}`]?.[player.id];
              if (paid) totalWeeks++;
              html += `<td>${paid ? 'PAID' : ''}</td>`;
            }
            html += `<td>$${(totalWeeks * s.weeklyFeePerPlayer).toFixed(2)}</td></tr>`;
          });
        });
        html += '</table><br/>';
        html += '<table border="1"><tr><th style="background-color:#f59e0b;">Week</th><th style="background-color:#f59e0b;">Paid Players</th><th style="background-color:#f59e0b;">Total Collected</th><th style="background-color:#f59e0b;">Owed to Alley</th><th style="background-color:#f59e0b;">Secretary Pay</th><th style="background-color:#f59e0b;">Prize Pool</th></tr>';
        for (let w = 1; w <= s.numWeeks; w++) {
          const d = getWeekData(w);
          html += `<tr><td>Week ${w}</td><td>${d.paidCount}</td><td>$${d.totalCollected.toFixed(2)}</td><td>$${d.owedToAlley.toFixed(2)}</td><td>$${d.secretaryPay.toFixed(2)}</td><td>$${d.prizePool.toFixed(2)}</td></tr>`;
        }
        html += `<tr style="font-weight:bold;background-color:#fef3c7;"><td>SEASON TOTAL</td><td></td><td>$${seasonTotals.totalCollected.toFixed(2)}</td><td>$${seasonTotals.owedToAlley.toFixed(2)}</td><td>$${seasonTotals.secretaryPay.toFixed(2)}</td><td>$${seasonTotals.prizePool.toFixed(2)}</td></tr>`;
        html += '</table></body></html>';
        const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${league.name.replace(/[^a-z0-9]/gi, '_')}_${new Date().toISOString().split('T')[0]}.xls`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const currentWeekData = getWeekData(selectedWeek);
      const currentWeekPayments = league.weeklyPayments[`week_${selectedWeek}`] || {};

      return (
        <div className="min-h-screen bg-slate-900 p-4 md:p-6">
          <div className="max-w-7xl mx-auto">
            <div className="flex flex-wrap items-center justify-between gap-3 mb-6">
              <div className="flex items-center gap-3 flex-1 min-w-0">
                <button onClick={goBack} className="text-slate-400 hover:text-white"><ChevronLeft className="w-6 h-6" /></button>
                <h1 className="text-2xl md:text-3xl font-bold text-white truncate">{league.name}</h1>
                {syncing && <span className="text-xs text-amber-500">Saving...</span>}
              </div>
              <div className="flex gap-2">
                {isOwner && <button onClick={() => setShowShareModal(true)} className="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-2 rounded-lg flex items-center gap-2"><Share className="w-5 h-5" /> Share</button>}
                <button onClick={exportToXLS} className="bg-green-600 hover:bg-green-500 text-white font-bold px-4 py-2 rounded-lg flex items-center gap-2"><Download className="w-5 h-5" /> XLS</button>
              </div>
            </div>

            {syncError && <div className="bg-red-900/50 border border-red-700 text-red-200 rounded-lg p-3 mb-4 text-sm">{syncError}</div>}

            <div className="flex gap-2 mb-6 border-b border-slate-700 overflow-x-auto">
              <button onClick={() => setTab('weeks')} className={`px-4 py-3 font-semibold whitespace-nowrap ${tab === 'weeks' ? 'text-amber-500 border-b-2 border-amber-500' : 'text-slate-400 hover:text-white'}`}><Calendar className="w-4 h-4 inline mr-2" />Weekly Tracking</button>
              <button onClick={() => setTab('roster')} className={`px-4 py-3 font-semibold whitespace-nowrap ${tab === 'roster' ? 'text-amber-500 border-b-2 border-amber-500' : 'text-slate-400 hover:text-white'}`}><Users className="w-4 h-4 inline mr-2" />Team Roster</button>
              <button onClick={() => setTab('settings')} className={`px-4 py-3 font-semibold whitespace-nowrap ${tab === 'settings' ? 'text-amber-500 border-b-2 border-amber-500' : 'text-slate-400 hover:text-white'}`}><SettingsIcon className="w-4 h-4 inline mr-2" />Settings</button>
            </div>

            {tab === 'weeks' && <WeeksTab league={league} selectedWeek={selectedWeek} setSelectedWeek={setSelectedWeek} activePlayers={activePlayers} currentWeekPayments={currentWeekPayments} currentWeekData={currentWeekData} seasonTotals={seasonTotals} togglePayment={togglePayment} markAllPaid={markAllPaid} getWeekData={getWeekData} />}
            {tab === 'roster' && <RosterTab league={league} updateLeague={updateLeague} />}
            {tab === 'settings' && <SettingsTab league={league} updateLeague={updateLeague} />}

            {showShareModal && <ShareModal league={league} onClose={() => setShowShareModal(false)} />}
          </div>
        </div>
      );
    }

    // ============ SHARE MODAL ============
    function ShareModal({ league, onClose }) {
      const [email, setEmail] = useState('');
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');
      const [sharedUsers, setSharedUsers] = useState([]);

      const loadSharedUsers = useCallback(async () => {
        // Get the access records, then look up user info
        const { data: accessRecords } = await db
          .from('league_access')
          .select('id, user_id, role, created_at')
          .eq('league_id', league.id);
        setSharedUsers(accessRecords || []);
      }, [league.id]);

      useEffect(() => { loadSharedUsers(); }, [loadSharedUsers]);

      const handleShare = async () => {
        setError(''); setSuccess(''); setBusy(true);
        const trimmedEmail = email.trim().toLowerCase();
        if (!trimmedEmail) { setError('Enter an email address'); setBusy(false); return; }

        // Call an RPC or use direct query (we need a function since we can't query auth.users directly from client)
        // For now, we ask the user to share by having the other person sign up first, then add their user ID
        // Simpler approach: we use a lookup function
        try {
          const { data: userLookup, error: lookupError } = await db.rpc('get_user_id_by_email', { lookup_email: trimmedEmail });
          if (lookupError || !userLookup) {
            setError('User not found. They need to sign up first with that email.');
            setBusy(false);
            return;
          }
          const { error: insertError } = await db
            .from('league_access')
            .insert({ league_id: league.id, user_id: userLookup, role: 'editor' });
          if (insertError) {
            if (insertError.code === '23505') {
              setError('This user already has access.');
            } else {
              setError(insertError.message);
            }
          } else {
            setSuccess(`Access granted to ${trimmedEmail}`);
            setEmail('');
            await loadSharedUsers();
          }
        } catch (e) {
          setError('Could not share: ' + e.message);
        }
        setBusy(false);
      };

      const revokeAccess = async (accessId) => {
        if (!window.confirm('Remove this user\'s access?')) return;
        await db.from('league_access').delete().eq('id', accessId);
        await loadSharedUsers();
      };

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" onClick={onClose}>
          <div className="bg-slate-800 rounded-2xl p-6 w-full max-w-md border border-slate-700" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-xl font-bold text-white">Share League</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-white"><X className="w-5 h-5" /></button>
            </div>
            <p className="text-slate-400 text-sm mb-4">Give another person access to view and edit this league. They must sign up for an account first.</p>
            <div className="space-y-3">
              <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email address" className="w-full bg-slate-700 text-white rounded-lg px-4 py-3 border border-slate-600 focus:border-amber-500 focus:outline-none" />
              {error && <div className="text-red-400 text-sm">{error}</div>}
              {success && <div className="text-green-400 text-sm">{success}</div>}
              <button disabled={busy} onClick={handleShare} className="w-full bg-amber-500 hover:bg-amber-400 disabled:opacity-50 text-slate-900 font-bold py-3 rounded-lg">{busy ? 'Granting access...' : 'Grant Access'}</button>
            </div>

            {sharedUsers.length > 0 && (
              <div className="mt-6 pt-6 border-t border-slate-700">
                <h4 className="text-white font-semibold mb-3">People with access</h4>
                <div className="space-y-2">
                  {sharedUsers.map(u => (
                    <div key={u.id} className="flex items-center justify-between bg-slate-700 rounded-lg p-3">
                      <span className="text-slate-300 text-sm truncate">{u.user_id.substring(0, 12)}...</span>
                      <button onClick={() => revokeAccess(u.id)} className="text-red-400 hover:text-red-300 text-sm">Remove</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ============ WEEKS TAB ============
    function WeeksTab({ league, selectedWeek, setSelectedWeek, activePlayers, currentWeekPayments, currentWeekData, seasonTotals, togglePayment, markAllPaid, getWeekData }) {
      const s = league.settings;
      if (activePlayers.length === 0) {
        return <div className="bg-slate-800 rounded-xl p-12 text-center border border-slate-700"><p className="text-slate-400 text-lg mb-4">No players added yet.</p><p className="text-slate-500">Go to the Team Roster tab to add your players first.</p></div>;
      }
      const playersByTeam = {};
      league.teams.forEach(team => {
        const teamPlayers = team.players.filter(p => p.name.trim() !== '');
        if (teamPlayers.length > 0) playersByTeam[team.name] = teamPlayers;
      });
      return (
        <div className="space-y-6">
          <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <label className="block text-slate-300 text-sm font-semibold mb-2">Select Week</label>
            <div className="flex flex-wrap gap-2">
              {Array.from({ length: s.numWeeks }, (_, i) => i + 1).map(w => {
                const d = getWeekData(w);
                const hasData = d.paidCount > 0;
                return (
                  <button key={w} onClick={() => setSelectedWeek(w)} className={`px-4 py-2 rounded-lg font-semibold ${selectedWeek === w ? 'bg-amber-500 text-slate-900' : hasData ? 'bg-slate-700 text-white border border-green-600' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>{w}</button>
                );
              })}
            </div>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div className="bg-slate-800 rounded-xl p-4 border border-slate-700"><div className="text-slate-400 text-sm">Week {selectedWeek} Collected</div><div className="text-2xl font-bold text-white">${currentWeekData.totalCollected.toFixed(2)}</div><div className="text-xs text-slate-500">{currentWeekData.paidCount} of {activePlayers.length} paid</div></div>
            <div className="bg-slate-800 rounded-xl p-4 border border-slate-700"><div className="text-slate-400 text-sm">Owed to Alley</div><div className="text-2xl font-bold text-red-400">${currentWeekData.owedToAlley.toFixed(2)}</div></div>
            <div className="bg-slate-800 rounded-xl p-4 border border-slate-700"><div className="text-slate-400 text-sm">Secretary Pay</div><div className="text-2xl font-bold text-blue-400">${currentWeekData.secretaryPay.toFixed(2)}</div></div>
            <div className="bg-slate-800 rounded-xl p-4 border border-slate-700"><div className="text-slate-400 text-sm">Prize Pool Added</div><div className="text-2xl font-bold text-green-400">${currentWeekData.prizePool.toFixed(2)}</div></div>
          </div>
          <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
              <h3 className="text-xl font-bold text-white">Week {selectedWeek} Payments</h3>
              <div className="flex gap-2">
                <button onClick={() => markAllPaid(selectedWeek, true)} className="bg-green-600 hover:bg-green-500 text-white px-3 py-2 rounded-lg text-sm">Mark All Paid</button>
                <button onClick={() => markAllPaid(selectedWeek, false)} className="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg text-sm">Clear All</button>
              </div>
            </div>
            <div className="space-y-4">
              {Object.entries(playersByTeam).map(([teamName, players]) => (
                <div key={teamName}>
                  <h4 className="text-amber-500 font-bold mb-2">{teamName}</h4>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    {players.map(player => {
                      const isPaid = currentWeekPayments[player.id];
                      return (
                        <button key={player.id} onClick={() => togglePayment(selectedWeek, player.id)} className={`flex items-center justify-between p-3 rounded-lg border-2 transition-all ${isPaid ? 'bg-green-900/50 border-green-600 text-white' : 'bg-slate-700 border-slate-600 text-slate-300 hover:border-slate-500'}`}>
                          <span className="font-medium text-left">{player.name}{player.isSubstitute && <span className="text-xs text-slate-400 ml-1">(Sub)</span>}</span>
                          <div className={`w-8 h-8 rounded-full flex items-center justify-center ${isPaid ? 'bg-green-500' : 'bg-slate-600'}`}>{isPaid ? <Check className="w-5 h-5 text-white" /> : <X className="w-5 h-5 text-slate-400" />}</div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-gradient-to-br from-amber-900/30 to-slate-800 rounded-xl p-5 border border-amber-700">
            <h3 className="text-xl font-bold text-white mb-4">Season Totals</h3>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div><div className="text-slate-400 text-sm">Total Collected</div><div className="text-2xl font-bold text-white">${seasonTotals.totalCollected.toFixed(2)}</div></div>
              <div><div className="text-slate-400 text-sm">To Alley</div><div className="text-2xl font-bold text-red-400">${seasonTotals.owedToAlley.toFixed(2)}</div></div>
              <div><div className="text-slate-400 text-sm">Secretary Pay</div><div className="text-2xl font-bold text-blue-400">${seasonTotals.secretaryPay.toFixed(2)}</div></div>
              <div><div className="text-slate-400 text-sm">Prize Pool</div><div className="text-2xl font-bold text-green-400">${seasonTotals.prizePool.toFixed(2)}</div></div>
            </div>
          </div>
        </div>
      );
    }

    // ============ ROSTER TAB ============
    function RosterTab({ league, updateLeague }) {
      const updateTeamName = (teamId, name) => updateLeague({ teams: league.teams.map(t => t.id === teamId ? { ...t, name } : t) });
      const updatePlayerName = (teamId, playerId, name) => updateLeague({ teams: league.teams.map(t => t.id === teamId ? { ...t, players: t.players.map(p => p.id === playerId ? { ...p, name } : p) } : t) });
      return (
        <div className="space-y-4">
          <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700 text-sm text-slate-400">Add player names to each team. Leave empty slots blank if a team has fewer players. Substitute slots are marked with "(Sub)".</div>
          {league.teams.map(team => (
            <div key={team.id} className="bg-slate-800 rounded-xl p-5 border border-slate-700">
              <div className="mb-4">
                <label className="block text-amber-500 text-sm font-bold mb-1">Team Name</label>
                <input type="text" value={team.name} onChange={(e) => updateTeamName(team.id, e.target.value)} className="w-full bg-slate-700 text-white text-lg font-bold rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none" />
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {team.players.map((player, idx) => (
                  <div key={player.id}>
                    <label className="block text-slate-400 text-xs mb-1">Player {idx + 1}{player.isSubstitute ? ' (Substitute)' : ''}</label>
                    <input type="text" value={player.name} onChange={(e) => updatePlayerName(team.id, player.id, e.target.value)} placeholder="Player name" className="w-full bg-slate-700 text-white rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none" />
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ============ SETTINGS TAB ============
    function SettingsTab({ league, updateLeague }) {
      const s = league.settings;
      const [localName, setLocalName] = useState(league.name);
      const updateSetting = (key, value) => updateLeague({ settings: { ...s, [key]: value } });
      const applyStructureChange = (numTeams, playersPerTeam, includeSubstitute) => {
        const totalSlots = playersPerTeam + (includeSubstitute ? 1 : 0);
        const newTeams = [];
        for (let i = 0; i < numTeams; i++) {
          const existingTeam = league.teams[i];
          const players = [];
          for (let j = 0; j < totalSlots; j++) {
            const isSubstitute = includeSubstitute && j === totalSlots - 1;
            const existingPlayer = existingTeam?.players[j];
            players.push({ id: existingPlayer?.id || `player_${Date.now()}_${i}_${j}_${Math.random()}`, name: existingPlayer?.name || '', isSubstitute });
          }
          newTeams.push({ id: existingTeam?.id || `team_${Date.now()}_${i}_${Math.random()}`, name: existingTeam?.name || `Team ${i + 1}`, players });
        }
        updateLeague({ settings: { ...s, numTeams, playersPerTeam, includeSubstitute }, teams: newTeams });
      };
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      return (
        <div className="space-y-4">
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <h3 className="text-xl font-bold text-white mb-4">League Info</h3>
            <div className="space-y-4">
              <div>
                <label className="block text-slate-300 text-sm font-semibold mb-1">League Name</label>
                <div className="flex gap-2">
                  <input type="text" value={localName} onChange={(e) => setLocalName(e.target.value)} className="flex-1 bg-slate-700 text-white rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none" />
                  <button onClick={() => updateLeague({ name: localName })} className="bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold px-4 py-2 rounded-lg flex items-center gap-1"><Save className="w-4 h-4" /> Save</button>
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label className="block text-slate-300 text-sm font-semibold mb-1">Start Date</label><input type="date" value={s.startDate} onChange={(e) => updateSetting('startDate', e.target.value)} className="w-full bg-slate-700 text-white rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none" /></div>
                <div><label className="block text-slate-300 text-sm font-semibold mb-1">Day of Week</label><select value={s.dayOfWeek} onChange={(e) => updateSetting('dayOfWeek', e.target.value)} className="w-full bg-slate-700 text-white rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none">{days.map(d => <option key={d} value={d}>{d}</option>)}</select></div>
              </div>
            </div>
          </div>
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <h3 className="text-xl font-bold text-white mb-1">Teams &amp; Players</h3>
            <p className="text-slate-400 text-sm mb-4">Changing these values will adjust team/player slots. Existing names are preserved.</p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div><label className="block text-slate-300 text-sm font-semibold mb-1">Number of Teams</label><input type="number" min="2" max="50" value={s.numTeams} onChange={(e) => { const val = Math.max(2, Math.min(50, parseInt(e.target.value) || 2)); applyStructureChange(val, s.playersPerTeam, s.includeSubstitute); }} className="w-full bg-slate-700 text-white rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none" /></div>
              <div><label className="block text-slate-300 text-sm font-semibold mb-1">Players per Team</label><input type="number" min="1" max="10" value={s.playersPerTeam} onChange={(e) => { const val = Math.max(1, Math.min(10, parseInt(e.target.value) || 4)); applyStructureChange(s.numTeams, val, s.includeSubstitute); }} className="w-full bg-slate-700 text-white rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none" /></div>
              <div><label className="block text-slate-300 text-sm font-semibold mb-1">Include Substitute Slot</label><div className="flex items-center h-10"><input type="checkbox" checked={s.includeSubstitute} onChange={(e) => applyStructureChange(s.numTeams, s.playersPerTeam, e.target.checked)} className="w-5 h-5 mr-2" /><span className="text-slate-300">Add a 5th player as substitute</span></div></div>
            </div>
          </div>
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <h3 className="text-xl font-bold text-white mb-4">Season &amp; Money</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div><label className="block text-slate-300 text-sm font-semibold mb-1">Number of Weeks</label><input type="number" min="1" max="52" value={s.numWeeks} onChange={(e) => updateSetting('numWeeks', Math.max(1, Math.min(52, parseInt(e.target.value) || 1)))} className="w-full bg-slate-700 text-white rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none" /></div>
              <div><label className="block text-slate-300 text-sm font-semibold mb-1">Lines (Games) per Week</label><input type="number" min="1" max="10" value={s.linesPerWeek} onChange={(e) => updateSetting('linesPerWeek', Math.max(1, Math.min(10, parseInt(e.target.value) || 3)))} className="w-full bg-slate-700 text-white rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none" /></div>
              <div><label className="block text-slate-300 text-sm font-semibold mb-1">Weekly Fee per Player ($)</label><input type="number" min="0" step="0.01" value={s.weeklyFeePerPlayer} onChange={(e) => updateSetting('weeklyFeePerPlayer', Math.max(0, parseFloat(e.target.value) || 0))} className="w-full bg-slate-700 text-white rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none" /><p className="text-xs text-slate-500 mt-1">Total amount each player pays per week</p></div>
              <div><label className="block text-slate-300 text-sm font-semibold mb-1">Alley Fee per Player ($)</label><input type="number" min="0" step="0.01" value={s.alleyFeePerPlayer} onChange={(e) => updateSetting('alleyFeePerPlayer', Math.max(0, parseFloat(e.target.value) || 0))} className="w-full bg-slate-700 text-white rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none" /><p className="text-xs text-slate-500 mt-1">Amount owed to the bowling alley per player per week</p></div>
              <div><label className="block text-slate-300 text-sm font-semibold mb-1">Secretary Rate per Line ($)</label><input type="number" min="0" step="0.01" value={s.secretaryRatePerLine} onChange={(e) => updateSetting('secretaryRatePerLine', Math.max(0, parseFloat(e.target.value) || 0))} className="w-full bg-slate-700 text-white rounded-lg px-3 py-2 border border-slate-600 focus:border-amber-500 focus:outline-none" /><p className="text-xs text-slate-500 mt-1">Default: $0.60 per line per player per week</p></div>
            </div>
            <div className="mt-4 bg-slate-900 rounded-lg p-4 border border-slate-700">
              <h4 className="text-amber-500 font-bold mb-2">Calculation Preview (per paid player per week)</h4>
              <div className="space-y-1 text-sm">
                <div className="flex justify-between text-slate-300"><span>Collected:</span><span>${s.weeklyFeePerPlayer.toFixed(2)}</span></div>
                <div className="flex justify-between text-red-400"><span>To Alley:</span><span>${s.alleyFeePerPlayer.toFixed(2)}</span></div>
                <div className="flex justify-between text-blue-400"><span>Secretary Pay ({s.linesPerWeek} lines × ${s.secretaryRatePerLine.toFixed(2)}):</span><span>${(s.linesPerWeek * s.secretaryRatePerLine).toFixed(2)}</span></div>
                <div className="flex justify-between text-green-400 font-bold pt-2 border-t border-slate-700"><span>To Prize Pool:</span><span>${(s.weeklyFeePerPlayer - s.alleyFeePerPlayer - (s.linesPerWeek * s.secretaryRatePerLine)).toFixed(2)}</span></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
